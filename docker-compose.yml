# Lab app for Coolify (Docker Compose).
#
# Networking: Coolify attaches services to its shared "coolify" network, so this
# app can reach the existing database by its service name `postgres-db` on the
# internal port 5432 (the host's 5433 is only the published mapping). Enable
# "Connect To Predefined Network" on this resource in Coolify if it can't
# resolve postgres-db.
#
# Set these env vars in Coolify: DB_PASSWORD, SESSION_SECRET, and (optional)
# ADMIN_EMAIL + ADMIN_PASSWORD to auto-create the superadmin on first deploy.

services:
  lab:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-admin}:${DB_PASSWORD}@postgres-db:5432/${DB_NAME:-master_db}"
      SESSION_SECRET: "${SESSION_SECRET}"
      NODE_ENV: "production"
      TZ: "America/Bogota"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
    ports:
      - "3000:3000"
    networks:
      - coolify

# Join the shared "coolify" network where the database (postgres-db) lives.
networks:
  coolify:
    external: true
